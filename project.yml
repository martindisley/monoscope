name: Monoscope

options:
  bundleIdPrefix: com.monoscope
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: 1

targets:
  Monoscope:
    type: application
    platform: macOS
    
    info:
      path: Monoscope/App/Info.plist
      properties:
        CFBundleDisplayName: Monoscope
        CFBundleName: Monoscope
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
    
    entitlements:
      path: SteppingStone/App/SteppingStone.entitlements
    
    sources:
      - path: Monoscope
        excludes:
          - "**/.DS_Store"
    
    settings:
      base:
        PRODUCT_NAME: Monoscope
        PRODUCT_BUNDLE_IDENTIFIER: com.monoscope.Monoscope
        INFOPLIST_FILE: Monoscope/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: Monoscope/App/Monoscope.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
      
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule

schemes:
  Monoscope:
    build:
      targets:
        Monoscope: all
    run:
      config: Debug
    archive:
      config: Release
